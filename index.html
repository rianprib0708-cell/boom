<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Hand Gesture Stable HP</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 100; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #video-preview { 
            position: absolute; bottom: 20px; right: 20px; 
            width: 120px; border-radius: 8px; border: 2px solid #fff; 
            transform: scaleX(-1); z-index: 10; background: #222;
        }
        .hint { font-size: 0.8em; color: #ccc; margin-top: 5px; }
    </style>
</head>
<body>

<div id="ui">
    <h2 id="status">Memuat AI...</h2>
    <p id="current-shape">Pola: Sphere</p>
    <div class="hint">Kepalkan tangan lalu buka untuk MELEDAK</div>
</div>

<video id="input-video" style="display:none;" playsinline></video>
<video id="video-preview" autoplay playsinline muted></video>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

const PARTICLE_COUNT = 4500;
let handLandmarker;
let video = document.getElementById("input-video");
let preview = document.getElementById("video-preview");

// --- THREE.JS SETUP ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const geometry = new THREE.BufferGeometry();
const posArray = new Float32Array(PARTICLE_COUNT * 3);
const colorArray = new Float32Array(PARTICLE_COUNT * 3);

for(let i=0; i<PARTICLE_COUNT*3; i++) {
    posArray[i] = (Math.random() - 0.5) * 10;
    colorArray[i] = Math.random();
}

geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

const material = new THREE.PointsMaterial({
    size: 0.05,
    vertexColors: true,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});

const points = new THREE.Points(geometry, material);
scene.add(points);
camera.position.z = 10;

// --- GENERATE TEMPLATES ---
const templates = { sphere: [], heart: [], flower: [] };
for (let i = 0; i < PARTICLE_COUNT; i++) {
    // Sphere
    const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
    const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
    templates.sphere.push(3 * Math.cos(theta) * Math.sin(phi), 3 * Math.sin(theta) * Math.sin(phi), 3 * Math.cos(phi));
    
    // Heart
    const t = Math.random() * Math.PI * 2;
    templates.heart.push(
        4 * Math.pow(Math.sin(t), 3) * 0.1, 
        3.25 * (13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)) * 0.1, 
        (Math.random()-0.5)*0.5
    );
    
    // Flower
    const a = (i / PARTICLE_COUNT) * Math.PI * 20;
    const r = 3.5 * Math.cos(2.5 * a);
    templates.flower.push(r * Math.cos(a), r * Math.sin(a), (Math.random()-0.5)*0.2);
}

// --- STATE MANAGEMENT ---
let currentTemplate = 'sphere';
let isFist = false;
let explosion = 0;
let smoothPos = new THREE.Vector3(0, 0, 0);

async function start() {
    try {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task` },
            runningMode: "VIDEO", numHands: 1
        });

        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user", width: 640, height: 480 } 
        });
        
        video.srcObject = stream;
        preview.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            document.getElementById('status').innerText = "Kamera Aktif";
            detect();
        };
    } catch (err) {
        document.getElementById('status').innerText = "Gagal Akses Kamera!";
    }
}

function detect() {
    if (handLandmarker && video.currentTime !== 0) {
        const result = handLandmarker.detectForVideo(video, performance.now());
        if (result.landmarks && result.landmarks.length > 0) {
            const hand = result.landmarks[0];
            
            // Pergerakan halus (Smoothing)
            const targetX = -(hand[9].x - 0.5) * 22;
            const targetY = -(hand[9].y - 0.5) * 22;
            smoothPos.x += (targetX - smoothPos.x) * 0.12;
            smoothPos.y += (targetY - smoothPos.y) * 0.12;
            points.position.set(smoothPos.x, smoothPos.y, 0);

            // Deteksi Kepalan Berdasarkan Jarak Jari ke Telapak
            const d = (p1, p2) => Math.sqrt((p1.x-p2.x)**2 + (p1.y-p2.y)**2);
            const distPalm = d(hand[8], hand[0]); 
            
            const wasFist = isFist;
            isFist = distPalm < 0.13; // Jari dekat ke telapak = Mengepal

            if (wasFist && !isFist) {
                // EFEK MELEDAK SAAT TANGAN DIBUKA
                explosion = 1.6;
                const shapes = ['sphere', 'heart', 'flower'];
                currentTemplate = shapes[Math.floor(Math.random()*shapes.length)];
                document.getElementById('current-shape').innerText = `Pola: ${currentTemplate.toUpperCase()}`;
            }

            // Ubah warna berdasarkan posisi tangan
            const colorAttr = geometry.attributes.color;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                colorAttr.setXYZ(i, hand[8].x, 0.5, 1 - hand[8].x);
            }
            colorAttr.needsUpdate = true;
        }
    }
    requestAnimationFrame(detect);
}

function animate() {
    requestAnimationFrame(animate);
    const pos = geometry.attributes.position;
    const target = templates[currentTemplate];
    
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        if (isFist) {
            // Partikel menyusut ke tengah tangan
            pos.array[i3] *= 0.82;
            pos.array[i3+1] *= 0.82;
            pos.array[i3+2] *= 0.82;
        } else {
            // Animasi transisi pola
            let tx = target[i3];
            let ty = target[i3+1];
            let tz = target[i3+2];

            if (explosion > 0.01) {
                // Tambahan gerakan acak saat meledak
                pos.array[i3] += (Math.random()-0.5) * explosion * 10;
                pos.array[i3+1] += (Math.random()-0.5) * explosion * 10;
                pos.array[i3+2] += (Math.random()-0.5) * explosion * 10;
            }

            pos.array[i3] += (tx - pos.array[i3]) * 0.09;
            pos.array[i3+1] += (ty - pos.array[i3+1]) * 0.09;
            pos.array[i3+2] += (tz - pos.array[i3+2]) * 0.09;
        }
    }
    
    if (explosion > 0) explosion *= 0.88; // Redam ledakan
    
    pos.needsUpdate = true;
    points.rotation.y += 0.005;
    renderer.render(scene, camera);
}

start();
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
